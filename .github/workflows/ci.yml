name: CI

# Push/PR quality gates: the canonical CLAUDE.md "Standard gates" run on every
# change to main, so a broken gate (e.g. the missing pytest-cov that slipped into
# v2.2.0 and made the coverage gate inert) cannot reach a release unnoticed.
# release.yml stays publish-only; this workflow is the correctness net.
#
# NOTE: DECISIONS.md, CLAUDE.md and scripts/ are gitignored and never reach the
# runner, so ADR-parity (scripts/adr_check.py) is a LOCAL gate (run it from /ship
# or /meta-audit), not a CI job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: ruff format --check
        run: ruff format --check src/ tests/
      - name: ruff check
        run: ruff check src/ tests/
      - name: compileall
        run: python -m compileall -q src/

  test:
    name: Tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # >=3.12 is the supported floor; 3.13 guards one version ahead. Local dev
        # runs 3.14 — add it here once PySide6 cp314 wheels are confirmed green on
        # the runner.
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install headless Qt runtime libs
        # PySide6 dlopens libEGL/libGL even under the offscreen platform. These
        # package names are stable across Ubuntu 22.04/24.04. If a future PySide6
        # bump needs another lib this is the one CI-specific bit that can't be
        # verified locally — add it here.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: pytest + branch coverage
        # The floor is enforced by fail_under in pyproject [tool.coverage.report];
        # --cov with no target reads source = ["control_ofc"] from the same config.
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --cov --cov-branch --cov-report=term-missing -q
