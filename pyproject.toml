[project]
name = "control-ofc-gui"
version = "1.1.0"
description = "Desktop fan control GUI for the Control-OFC daemon"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "PySide6>=6.6",
    "httpx>=0.27",
    "pyqtgraph>=0.14",
    "numpy>=1.26",
    "colorama>=0.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-qt>=4.3",
    "ruff>=0.4",
]

[project.scripts]
control-ofc-gui = "control_ofc.main:main"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
